<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Qidong Sun's academic and engineering portfolio in robotics, robot learning, reinforcement learning, and quadruped locomotion."
    />
    <title>Qidong Sun</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="site-title" href="#home" id="site-title">Qidong Sun</a>
        <div class="nav-wrap">
          <nav aria-label="Main navigation" id="main-nav"></nav>
          <button class="lang-toggle" id="lang-toggle" type="button" aria-label="Switch language">
            中文
          </button>
        </div>
      </header>

      <main id="home">
        <section class="hero" aria-labelledby="hero-name">
          <div class="portrait" aria-label="Profile photo placeholder">
            <span id="portrait-initial">Q</span>
          </div>
          <div class="hero-copy">
            <p class="small-label" id="hero-label"></p>
            <h1 id="hero-name">Qidong Sun</h1>
            <p class="subtitle" id="hero-subtitle"></p>
            <p id="hero-summary"></p>
            <p class="button-row" id="hero-links"></p>
          </div>
        </section>

        <section id="about">
          <h2 data-section-title="about"></h2>
          <p id="about-text"></p>
          <div class="education-list" id="education-list"></div>
        </section>

        <section id="interests">
          <h2 data-section-title="interests"></h2>
          <div class="tag-grid" id="interest-list"></div>
        </section>

        <section id="projects">
          <h2 data-section-title="projects"></h2>
          <div class="project-list" id="project-list"></div>
        </section>

        <section id="experience">
          <h2 data-section-title="experience"></h2>
          <div class="item-list" id="experience-list"></div>
        </section>

        <section id="skills">
          <h2 data-section-title="skills"></h2>
          <div class="skill-list" id="skill-list"></div>
        </section>

        <section id="certificates">
          <h2 data-section-title="certificates"></h2>
          <ul class="plain-list" id="certificate-list"></ul>
        </section>

        <section id="awards">
          <h2 data-section-title="awards"></h2>
          <ul class="plain-list" id="award-list"></ul>
        </section>

        <section id="contact">
          <h2 data-section-title="contact"></h2>
          <p id="contact-text"></p>
          <p class="links" id="contact-links"></p>
        </section>
      </main>

      <footer>
        <span id="footer-updated"></span>
        <span>Built with GitHub Pages</span>
      </footer>
    </div>

    <script src="site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
